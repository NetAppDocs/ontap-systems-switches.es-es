indexpage:
  title: Conmutadores de sistemas AFX
  summary: Utilice los documentos de este sitio para instalar, configurar y mantener
    sus conmutadores de sistemas AFX para implementaciones de clústeres ONTAP .
  keywords: AFX systems switches, cisco nexus switches, cluster switches, ontap clusters
  lead: Los conmutadores de sistemas AFX le permiten crear clústeres ONTAP con más
    de dos nodos. Estos conmutadores de plataforma Cisco Nexus 9000 proporcionan la
    base para soluciones de interconexión de clústeres escalables en entornos NetApp
    ONTAP .
